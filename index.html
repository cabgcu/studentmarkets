<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Application | Student Market</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Modern Typography Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            font-family: var(--font-sans);
            background-color: #050505;
        }

        /* Modern entry animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        /* Subtle background pulse for depth */
        @keyframes ambientGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }
        .ambient-glow {
            animation: ambientGlow 8s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-white antialiased min-h-screen relative overflow-hidden selection:bg-white selection:text-black">

    <!-- Ambient Background System -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <!-- Base Image with scale for a cinematic feel -->
        <img
            src="https://i.imgur.com/65f9UL5.jpeg"
            alt="Night Market"
            class="w-full h-full object-cover object-center opacity-75 scale-105"
        />

        <!-- Modern Vignette & Gradient Masking -->
        <div class="absolute inset-0 bg-gradient-to-r from-[#050505]/90 via-[#050505]/50 to-transparent"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-[#050505]/80 via-transparent to-[#050505]/30"></div>

        <!-- Subtle Monochrome Ambient Glow (Mesh Gradient effect) -->
        <div class="absolute -left-[10%] top-[20%] w-[50vw] h-[50vw] bg-gradient-to-br from-white/10 via-white/5 to-transparent rounded-full blur-[120px] ambient-glow mix-blend-screen"></div>
    </div>

    <!-- Minimalist Top Navigation -->
    <nav class="relative z-20 w-full px-5 py-6 sm:py-8 sm:px-12 lg:px-24 flex justify-between items-center animate-fade-up">
        <div class="flex items-center gap-4 md:gap-6">
            <!-- Brand Logo -->
            <img src="https://i.imgur.com/p2qZOL5.png" alt="Canyon CAB Logo" class="h-9 sm:h-10 md:h-12 w-auto object-contain drop-shadow-lg opacity-90 hover:opacity-100 transition-opacity duration-300" />

            <!-- Minimalist Text -->
            <div class="hidden sm:flex items-center gap-4 text-xs font-semibold tracking-[0.3em] uppercase text-white/50">
                Canyon Activities Board
            </div>
        </div>
    </nav>

    <!-- Main Hero Content -->
    <main class="relative z-10 flex flex-col justify-center min-h-[calc(100vh-100px)] pb-10 sm:pb-0">
        <div class="container mx-auto px-5 sm:px-12 lg:px-24 w-full">
            <div class="max-w-3xl flex flex-col items-start text-left w-full">

                <!-- Modern Glassmorphic Tag -->
                <div class="animate-fade-up delay-100 mb-5 sm:mb-6 inline-flex items-center gap-2 px-3 sm:px-4 py-1.5 sm:py-2 rounded-full bg-white/5 border border-white/10 backdrop-blur-md">
                    <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-white animate-pulse shadow-[0_0_10px_rgba(255,255,255,0.8)]"></span>
                    <h2 class="text-[10px] sm:text-xs font-semibold tracking-[0.2em] uppercase text-white/80">
                        Student Market
                    </h2>
                </div>

                <!-- Ultra-Clean Bold Typography -->
                <div class="animate-fade-up delay-200 mb-10 sm:mb-12">
                    <h1 class="text-5xl sm:text-6xl lg:text-[5.5rem] font-extrabold uppercase tracking-tighter text-white leading-[0.9] drop-shadow-2xl">
                        Vendor<br />
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-white/50">Application</span>
                    </h1>
                </div>

                <!-- 2026 Style Call to Action (Optimized for Mobile Touch) -->
                <div class="animate-fade-up delay-300 flex flex-col sm:flex-row items-stretch sm:items-center gap-4 sm:gap-6 w-full sm:w-auto">

                    <!-- Primary Button: Blue/Purple Gradient -->
                    <a
                        href="./apply.html"
                        class="group relative w-full sm:w-auto px-8 py-4 sm:py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-full font-semibold text-base overflow-hidden transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-[0_8px_20px_rgba(147,51,234,0.3)] hover:shadow-[0_8px_30px_rgba(147,51,234,0.5)] flex justify-center">
                        <!-- Hover glow effect behind text -->
                        <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-blue-500 to-purple-500 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <span class="relative z-10 flex items-center justify-center gap-2">
                            Start Application
                            <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                        </span>
                    </a>

                    <!-- Secondary Button: Sleek Ghost Link -->
                    <a
                        href="./apply.html?mode=status"
                        class="group flex justify-center items-center gap-1.5 px-4 py-3 sm:py-2 text-sm font-medium text-white/60 hover:text-white transition-colors duration-300">
                        Check Application Status
                        <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </a>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
